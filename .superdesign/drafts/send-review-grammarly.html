<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>Vanguard — Send review (ADR 0025)</title>
  <style>
    body { margin:0; min-height:100vh; display:grid; place-items:center; font-family:Segoe UI,system-ui,sans-serif;
      background:linear-gradient(160deg,#0f172a 0%,#334155 100%); padding:32px; }
    .card { width:min(560px,92vw); background:#fff; border-radius:14px;
      box-shadow:0 24px 64px rgba(15,23,42,.4),0 0 0 1px rgba(225,29,72,.12); overflow:hidden; }
    header { padding:18px 20px 12px; border-bottom:1px solid #ffe4e6;
      background:linear-gradient(180deg,#fff1f2,#fff); }
    h1 { margin:0; font:700 17px/1.3 Segoe UI,system-ui,sans-serif; color:#9f1239; }
    p { margin:6px 0 0; font:13px/1.45 Segoe UI,system-ui,sans-serif; color:#64748b; }
    .body { padding:16px 20px; }
    .preview { padding:14px 16px; border-radius:10px; background:#fff7f8; border:1px solid #fecdd3;
      font:15px/1.65 Segoe UI,system-ui,sans-serif; }
    .u { background:rgba(225,29,72,.16); border-bottom:2.5px solid #e11d48; color:#9f1239; font-weight:600; padding:0 1px; border-radius:2px; }
    .pop { margin-top:12px; border:1px solid #fecdd3; border-radius:10px; padding:12px 14px;
      box-shadow:0 12px 32px rgba(225,29,72,.18); }
    .cls { font-size:11px; font-weight:700; letter-spacing:.04em; color:#e11d48; text-transform:uppercase; }
    .rec { font-family:ui-monospace,Consolas,monospace; background:#fff1f2; border:1px solid #fecdd3;
      padding:8px 10px; border-radius:6px; margin:8px 0; }
    input { width:100%; box-sizing:border-box; border:1.5px solid #fda4af; border-radius:6px; padding:8px 10px; margin-bottom:8px; }
    .actions { display:flex; gap:8px; }
    button { flex:1; border-radius:8px; padding:10px 16px; font:600 13px Segoe UI,system-ui,sans-serif; cursor:pointer; }
    .pri { border:none; background:#e11d48; color:#fff; }
    .sec { border:1px solid #fecdd3; background:#fff; color:#9f1239; }
    footer { padding:12px 20px 16px; border-top:1px solid #f1f5f9; display:flex; gap:10px; justify-content:flex-end; background:#fafafa; }
  </style>
</head>
<body>
  <div class="card">
    <header>
      <h1>Review before send</h1>
      <p>1 item still needs Accept or Ignore. Hover a red underline.</p>
    </header>
    <div class="body">
      <div class="preview">Please call <span class="u">Ahmad</span> about IC <span class="u">890101-14-5555</span>.</div>
      <div class="pop">
        <div class="cls">NRIC</div>
        <div>Looks like a Malaysian identity card number.</div>
        <div class="rec">Recommend: NRIC_1</div>
        <input placeholder="Reason required to ignore" />
        <div class="actions">
          <button type="button" class="pri">Accept</button>
          <button type="button" class="sec">Ignore</button>
        </div>
      </div>
    </div>
    <footer>
      <button type="button" class="sec" style="flex:0 0 auto">Accept all</button>
      <button type="button" class="pri" style="flex:0 0 auto;opacity:.45">Proceed</button>
    </footer>
  </div>
</body>
</html>
